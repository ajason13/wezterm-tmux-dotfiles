name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n install-macos.sh uninstall-macos.sh tmux/tmux-llm-status scripts/background-bundles.sh scripts/check-background-assets.sh scripts/check-background-inbox.sh scripts/test-check-background-inbox.sh scripts/list-background-inbox.sh scripts/test-list-background-inbox.sh scripts/check-manifest-paths.sh scripts/test-check-manifest-paths.sh scripts/publish-backgrounds.sh scripts/test-publish-backgrounds.sh scripts/fetch-backgrounds.sh scripts/test-fetch-backgrounds.sh

      - name: Lint shell scripts (shellcheck)
        run: shellcheck install-macos.sh uninstall-macos.sh tmux/tmux-llm-status scripts/background-bundles.sh scripts/check-background-assets.sh scripts/check-background-inbox.sh scripts/test-check-background-inbox.sh scripts/list-background-inbox.sh scripts/test-list-background-inbox.sh scripts/check-manifest-paths.sh scripts/test-check-manifest-paths.sh scripts/publish-backgrounds.sh scripts/test-publish-backgrounds.sh scripts/fetch-backgrounds.sh scripts/test-fetch-backgrounds.sh

      - name: Check executable scripts
        run: |
          test -x install-macos.sh
          test -x uninstall-macos.sh
          test -x tmux/tmux-llm-status
          test -x scripts/check-background-inbox.sh
          test -x scripts/test-check-background-inbox.sh
          test -x scripts/list-background-inbox.sh
          test -x scripts/test-list-background-inbox.sh
          test -x scripts/background-bundles.sh
          test -x scripts/check-manifest-paths.sh
          test -x scripts/test-check-manifest-paths.sh
          test -x scripts/check-background-assets.sh
          test -x scripts/publish-backgrounds.sh
          test -x scripts/test-publish-backgrounds.sh
          test -x scripts/fetch-backgrounds.sh
          test -x scripts/test-fetch-backgrounds.sh

      - name: Check ignored macOS metadata
        run: |
          ! find . -name .DS_Store -print | grep .

      - name: Check background inbox workflow
        run: ./scripts/test-check-background-inbox.sh

      - name: Check manifest paths
        run: ./scripts/check-manifest-paths.sh

      - name: Run script test suites
        run: |
          ./scripts/test-check-manifest-paths.sh
          ./scripts/test-publish-backgrounds.sh
          ./scripts/test-fetch-backgrounds.sh
          ./scripts/test-list-background-inbox.sh
