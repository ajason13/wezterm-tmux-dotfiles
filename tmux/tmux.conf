set -g default-terminal "tmux-256color"
set -as terminal-features ",wezterm:RGB,xterm-256color:RGB"

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 50000
set -g escape-time 10
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off
set -g allow-rename off
setw -g monitor-activity on
set -g visual-activity off

set -g status on
set -g status-position top
set -g status-interval 2
set -g status-left-length 32
set -g status-right-length 96
set -g status-style 'bg=#111827,fg=#9ca3af'
set -g status-left '#[bold,fg=#7dd3fc,bg=#111827]#S#[default] '
set -g status-right '#[fg=#8b95a7,bg=#111827]%Y-%m-%d #[fg=#c7d2fe,bg=#111827]%H:%M '

set -g window-status-separator ' '
set -g window-status-style 'fg=#8b95a7,bg=#111827'
set -g window-status-current-style 'bold,fg=#e5e7eb,bg=#3f465c'
set -g window-status-format '#{?#{@llm_status},#{@llm_status} ,#{?window_activity_flag,● ,}}#I:#W'
set -g window-status-current-format '#{?#{@llm_status},#{@llm_status} ,}#I:#W '
set -g window-status-activity-style 'fg=#fbbf24,bg=#111827,bold'
set -g window-status-bell-style 'fg=#fecaca,bg=#7f1d1d,bold'
run-shell -b '~/.local/bin/tmux-llm-status restart'

bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
