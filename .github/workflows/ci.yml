name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell syntax
        run: bash -n install-macos.sh uninstall-macos.sh tmux/tmux-llm-status scripts/background-bundles.sh scripts/check-background-assets.sh scripts/check-background-inbox.sh scripts/test-check-background-inbox.sh scripts/list-background-inbox.sh scripts/test-list-background-inbox.sh scripts/check-manifest-paths.sh scripts/test-check-manifest-paths.sh scripts/publish-backgrounds.sh scripts/test-publish-backgrounds.sh scripts/fetch-backgrounds.sh scripts/test-fetch-backgrounds.sh scripts/test-backgrounds-lua.sh scripts/test-nvim.sh

      - name: Lint shell scripts (shellcheck)
        run: shellcheck install-macos.sh uninstall-macos.sh tmux/tmux-llm-status scripts/background-bundles.sh scripts/check-background-assets.sh scripts/check-background-inbox.sh scripts/test-check-background-inbox.sh scripts/list-background-inbox.sh scripts/test-list-background-inbox.sh scripts/check-manifest-paths.sh scripts/test-check-manifest-paths.sh scripts/publish-backgrounds.sh scripts/test-publish-backgrounds.sh scripts/fetch-backgrounds.sh scripts/test-fetch-backgrounds.sh scripts/test-backgrounds-lua.sh scripts/test-nvim.sh

      - name: Check executable scripts
        run: |
          test -x install-macos.sh
          test -x uninstall-macos.sh
          test -x tmux/tmux-llm-status
          test -x scripts/check-background-inbox.sh
          test -x scripts/test-check-background-inbox.sh
          test -x scripts/list-background-inbox.sh
          test -x scripts/test-list-background-inbox.sh
          test -x scripts/background-bundles.sh
          test -x scripts/check-manifest-paths.sh
          test -x scripts/test-check-manifest-paths.sh
          test -x scripts/check-background-assets.sh
          test -x scripts/publish-backgrounds.sh
          test -x scripts/test-publish-backgrounds.sh
          test -x scripts/fetch-backgrounds.sh
          test -x scripts/test-fetch-backgrounds.sh
          test -x scripts/test-backgrounds-lua.sh
          test -x scripts/test-nvim.sh

      - name: Check ignored macOS metadata
        run: |
          ! find . -name .DS_Store -print | grep .

      - name: Check background inbox workflow
        run: ./scripts/test-check-background-inbox.sh

      - name: Check manifest paths
        run: ./scripts/check-manifest-paths.sh

      - name: Run script test suites
        run: |
          ./scripts/test-check-manifest-paths.sh
          ./scripts/test-publish-backgrounds.sh
          ./scripts/test-fetch-backgrounds.sh
          ./scripts/test-list-background-inbox.sh

      - name: Install Neovim (current stable, for config headless-load test)
        run: |
          curl -fsSL -o /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          sudo tar -C /opt -xzf /tmp/nvim.tar.gz
          echo "/opt/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install tree-sitter CLI (nvim-treesitter main compiles parsers with it)
        run: |
          curl -fsSL -o /tmp/tree-sitter.gz \
            https://github.com/tree-sitter/tree-sitter/releases/latest/download/tree-sitter-linux-x64.gz
          gunzip /tmp/tree-sitter.gz
          sudo install -m 0755 /tmp/tree-sitter /usr/local/bin/tree-sitter

      - name: Neovim config loads clean
        run: ./scripts/test-nvim.sh

      - name: Install Lua (for WezTerm module unit tests)
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Run WezTerm module unit tests
        run: ./scripts/test-backgrounds-lua.sh
